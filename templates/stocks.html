<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stock Items - SmartERP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; }
        .navbar { background: #1a237e; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .navbar a { color: white; text-decoration: none; font-size: 14px; }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        .card { background: white; border-radius: 10px; padding: 25px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { color: #1a237e; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #555; font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        button { background: #1a237e; color: white; padding: 10px 25px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        button:hover { background: #283593; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1a237e; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f5f5f5; }
        .success { background: #e8f5e9; color: #2e7d32; padding: 10px; border-radius: 6px; margin-bottom: 15px; display: none; }
        .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    </style>
</head>
<body>
<div class="navbar">
    <h1>💼 SmartERP</h1>
    <a href="/">← Back to Dashboard</a>
</div>
<div class="container">
    <div class="card">
        <h2>➕ Add Stock Item</h2>
        <div class="success" id="success">Stock item created successfully!</div>
        <div class="grid2">
            <div class="form-group"><label>Item Name</label><input type="text" id="name" placeholder="e.g. Laptop"></div>
            <div class="form-group"><label>SKU Code</label><input type="text" id="sku" placeholder="e.g. LAP-001"></div>
            <div class="form-group"><label>Purchase Price (₹)</label><input type="number" id="purchase_price" placeholder="0"></div>
            <div class="form-group"><label>Selling Price (₹)</label><input type="number" id="selling_price" placeholder="0"></div>
            <div class="form-group"><label>Quantity</label><input type="number" id="quantity" placeholder="0"></div>
        </div>
        <button onclick="createStock()">Add Stock Item</button>
    </div>
    <div class="card">
        <h2>📦 All Stock Items</h2>
        <table>
            <thead><tr><th>ID</th><th>Name</th><th>SKU</th><th>Purchase Price</th><th>Selling Price</th><th>Quantity</th></tr></thead>
            <tbody id="stock-table"></tbody>
        </table>
    </div>
</div>
<script>
    function loadStocks() {
        fetch('/stocks').then(r => r.json()).then(data => {
            const tbody = document.getElementById('stock-table');
            tbody.innerHTML = data.map(i => `<tr><td>${i.id}</td><td>${i.name}</td><td>${i.sku}</td><td>₹${i.purchase_price}</td><td>₹${i.selling_price}</td><td>${i.quantity}</td></tr>`).join('');
        });
    }
    function createStock() {
        const data = { name: document.getElementById('name').value, sku: document.getElementById('sku').value, purchase_price: parseFloat(document.getElementById('purchase_price').value), selling_price: parseFloat(document.getElementById('selling_price').value), quantity: parseInt(document.getElementById('quantity').value) };
        fetch('/stock', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) })
        .then(r => r.json()).then(() => { document.getElementById('success').style.display = 'block'; loadStocks(); });
    }
    loadStocks();
</script>
</body>
</html>
