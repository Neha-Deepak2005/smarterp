<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Purchase Voucher - SmartERP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; }
        .navbar { background: #1a237e; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .navbar a { color: white; text-decoration: none; font-size: 14px; }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        .card { background: white; border-radius: 10px; padding: 25px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { color: #1a237e; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #555; font-size: 14px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        button { background: #1a237e; color: white; padding: 10px 25px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        button:hover { background: #283593; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1a237e; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .success { background: #e8f5e9; color: #2e7d32; padding: 10px; border-radius: 6px; margin-bottom: 15px; display: none; }
        .result { background: #e3f2fd; color: #1565c0; padding: 15px; border-radius: 6px; margin-top: 15px; display: none; }
    </style>
</head>
<body>
<div class="navbar">
    <h1>💼 SmartERP</h1>
    <a href="/">← Back to Dashboard</a>
</div>
<div class="container">
    <div class="card">
        <h2>🛒 Create Purchase Voucher</h2>
        <div class="success" id="success">Purchase recorded successfully!</div>
        <div class="form-group"><label>Supplier</label><select id="supplier"></select></div>
        <div class="form-group"><label>Stock Item</label><select id="item"></select></div>
        <div class="form-group"><label>Quantity</label><input type="number" id="quantity" placeholder="Enter quantity" min="1"></div>
        <button onclick="createPurchase()">Record Purchase</button>
        <div class="result" id="result"></div>
    </div>
    <div class="card">
        <h2>🛒 All Purchases</h2>
        <table>
            <thead><tr><th>ID</th><th>Supplier ID</th><th>Item ID</th><th>Quantity</th><th>Total Amount</th></tr></thead>
            <tbody id="purchases-table"></tbody>
        </table>
    </div>
</div>
<script>
    fetch('/ledgers').then(r => r.json()).then(data => {
        const sel = document.getElementById('supplier');
        data.filter(l => l.type === 'supplier').forEach(l => sel.innerHTML += `<option value="${l.id}">${l.name}</option>`);
    });
    fetch('/stocks').then(r => r.json()).then(data => {
        const sel = document.getElementById('item');
        data.forEach(i => sel.innerHTML += `<option value="${i.id}">${i.name} (Stock: ${i.quantity})</option>`);
    });
    function loadPurchases() {
        fetch('/purchases').then(r => r.json()).then(data => {
            document.getElementById('purchases-table').innerHTML = data.map(p => `<tr><td>${p.id}</td><td>${p.supplier_id}</td><td>${p.item_id}</td><td>${p.quantity}</td><td>₹${p.total_amount}</td></tr>`).join('');
        });
    }
    function createPurchase() {
        const data = { supplier_id: parseInt(document.getElementById('supplier').value), item_id: parseInt(document.getElementById('item').value), quantity: parseInt(document.getElementById('quantity').value) };
        fetch('/purchase', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) })
        .then(r => r.json()).then(res => {
            document.getElementById('success').style.display = 'block';
            document.getElementById('result').style.display = 'block';
            document.getElementById('result').innerHTML = `Total Amount: ₹${res.total_amount} | New Stock: ${res.new_stock} | Supplier Balance: ₹${res.supplier_balance}`;
            loadPurchases();
        });
    }
    loadPurchases();
</script>
</body>
</html>
